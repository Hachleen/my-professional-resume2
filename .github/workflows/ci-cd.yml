name: Build And Push to ECR

on: 
    push:
        # pull_requests: 
        #     branches: ['main', 'dev']
        branches: [ 'main']
permissions:
  id-token: write
  contents: read

jobs:
    build_scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the Code
              uses: actions/checkout@v7
            - name: Trivy Scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                scan-type: 'fs'
                severity: HIGH,CRITICAL
                exit-code: 1
            - name: Build Docker Image
              run: docker build -t 443496862989.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest .
            
            - name: Scan image with Trivy 
              uses: aquasecurity/trivy-action@v0.36.0
              with: 
                image-ref: 443496862989.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest
                format: table 
                exit-code: 0
                ignore-unfixed: true 
                severity: CRITICAL,HIGH
            - name: Push image to Ecr
              run: echo "push"
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4 # More information on this action can be found below in the 'AWS Credentials' section
              with:
                role-to-assume: arn:aws:iam::123456789012:role/my-github-actions-role
                aws-region: us-east-1
            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Push Image to Ecr
              run: docker push 443496862989.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest

    Deploy_to_ecs:
        needs: build_scan
        runs-on: ubuntu-latest
        steps:
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4 # More information on this action can be found below in the 'AWS Credentials' section
              with:
                role-to-assume: arn:aws:iam::443496862989:role/Github-action-role
                aws-region: us-east-1
                
            - name: Deploy to ECS
              run: echo "Deploy"